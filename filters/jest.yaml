name: "jest"
version: 3
description: "Condensed jest output: suite results, assertion details, and summary"

match:
  command: "jest"
  exclude_flags: ["--json", "--verbose", "--version"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  # Remove blank lines
  - action: "remove_lines"
    pattern: "^\\s*$"
  # Remove stack traces (at Object., at Module., node_modules paths, node: internal)
  - action: "remove_lines"
    pattern: "^\\s+at "
  # Remove source context lines (line numbers with code and pointer lines)
  - action: "remove_lines"
    pattern: "^\\s+\\d+ \\|"
  - action: "remove_lines"
    pattern: "^\\s+\\|\\s+\\^"
  # Remove console.log noise
  - action: "remove_lines"
    pattern: "^\\s+console\\."
  # Remove Ran all test suites line
  - action: "remove_lines"
    pattern: "Ran all test suites"
  # Remove snapshot summary noise
  - action: "remove_lines"
    pattern: "^Snapshot Summary"
  # Keep suite results, assertion info, bullet points, and summary lines
  - action: "keep_lines"
    pattern: "(PASS|FAIL|Tests:|Test Suites:|Time:|expect|Expected|Received|●|thrown:)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 40
    overflow_msg: "... more output truncated"

on_error: "passthrough"

tests:
  - name: "all passing"
    input: |
      PASS  src/__tests__/utils.test.js
      PASS  src/__tests__/main.test.js

      Test Suites: 2 passed, 2 total
      Tests:       5 passed, 5 total
      Snapshots:   0 total
      Time:        1.234 s
    expected: |
      PASS  src/__tests__/utils.test.js
      PASS  src/__tests__/main.test.js
      Test Suites: 2 passed, 2 total
      Tests:       5 passed, 5 total
      Time:        1.234 s
  - name: "with failures and stack traces"
    input: |
      PASS  src/__tests__/utils.test.js
      FAIL  src/__tests__/main.test.js
        ● Main > should return correct value

          expect(received).toBe(expected)

          Expected: 4
          Received: 3

            5 |   test('should return correct value', () => {
            6 |     expect(calculate(2, 2)).toBe(4);
              |                             ^
            7 |   });

          at Object.<anonymous> (src/__tests__/main.test.js:6:29)

      Test Suites: 1 failed, 1 passed, 2 total
      Tests:       1 failed, 3 passed, 4 total
      Snapshots:   0 total
      Time:        1.234 s
      Ran all test suites.
    expected: |
      PASS  src/__tests__/utils.test.js
      FAIL  src/__tests__/main.test.js
        ● Main > should return correct value
          expect(received).toBe(expected)
          Expected: 4
          Received: 3
      Test Suites: 1 failed, 1 passed, 2 total
      Tests:       1 failed, 3 passed, 4 total
      Time:        1.234 s
