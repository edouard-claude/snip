name: "terraform"
version: 1
description: "Condensed terraform output: plan changes and errors"

match:
  command: "terraform"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(Plan:|Apply|Destroy|Error|Warning|created|destroyed|changed|No changes|will be|must be|forces replacement|\\+|\\-|~)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more changes"

on_error: "passthrough"
