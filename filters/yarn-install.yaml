name: "yarn-install"
version: 3
description: "Condensed yarn install output: completion summary and errors"

match:
  command: "yarn"
  subcommand: "install"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\[\\d+/\\d+\\] (Resolving|Fetching|Linking|Building)|YN0000: [\\u250c\\u2514\\u2502]|^\\s*$)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"

on_error: "passthrough"
