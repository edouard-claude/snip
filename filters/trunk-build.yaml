name: "trunk-build"
version: 1
description: "Condensed trunk build output"

match:
  command: "trunk"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(error|Error|warning|FAIL|SUCCESS|Build|Compiling|finished)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30

on_error: "passthrough"
