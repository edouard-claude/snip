name: "pip-install"
version: 3
description: "Condensed pip output: install result and errors only"

match:
  command: "pip"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  # Remove blank lines
  - action: "remove_lines"
    pattern: "^\\s*$"
  # Remove download/cache progress lines
  - action: "remove_lines"
    pattern: "(^\\s+Downloading|^\\s+Using cached|Collecting |^\\s+Preparing|^\\s+Building|^\\s+Installing build)"
  # Remove pip version warning
  - action: "remove_lines"
    pattern: "(\\[notice\\]|pip install --upgrade pip)"
  # Keep result lines and errors
  - action: "keep_lines"
    pattern: "(^Successfully installed|^Requirement already satisfied|^ERROR|^error:|Could not|No matching|installed$|WARNING)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"
  - action: "on_empty"
    message: "ok"

on_error: "passthrough"

tests:
  - name: "successful install"
    input: |
      Collecting requests==2.31.0
        Downloading requests-2.31.0-py3-none-any.whl (62 kB)
      Collecting urllib3<3,>=1.21.1
        Using cached urllib3-2.1.0-py3-none-any.whl (104 kB)
      Installing collected packages: urllib3, requests
      Successfully installed requests-2.31.0 urllib3-2.1.0

      [notice] A new release of pip is available: 23.2 -> 24.0
      [notice] To update, run: pip install --upgrade pip
    expected: |
      Successfully installed requests-2.31.0 urllib3-2.1.0
  - name: "already satisfied"
    input: |
      Requirement already satisfied: requests in ./venv/lib/python3.12/site-packages (2.31.0)
      Requirement already satisfied: urllib3<3,>=1.21.1 in ./venv/lib/python3.12/site-packages (2.1.0)
    expected: |
      Requirement already satisfied: requests in ./venv/lib/python3.12/site-packages (2.31.0)
      Requirement already satisfied: urllib3<3,>=1.21.1 in ./venv/lib/python3.12/site-packages (2.1.0)
  - name: "install error"
    input: |
      ERROR: Could not find a version that satisfies the requirement nonexistent-pkg
      ERROR: No matching distribution found for nonexistent-pkg
    expected: |
      ERROR: Could not find a version that satisfies the requirement nonexistent-pkg
      ERROR: No matching distribution found for nonexistent-pkg
