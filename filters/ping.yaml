name: "ping"
version: 1
description: "Condensed ping output: statistics only"

match:
  command: "ping"
  exclude_flags: ["--version", "-V"]

pipeline:
  - action: "keep_lines"
    pattern: "(^PING|^---.*statistics|packets? transmitted|rtt |round-trip|^\\d+ bytes.*time=)"
  - action: "tail"
    n: 5

on_error: "passthrough"
