name: "pre-commit"
version: 1
description: "Condensed pre-commit output: hook results"

match:
  command: "pre-commit"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(Passed|Failed|Skipped|error|hook id|\\.\\.\\.|Installing|Check)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30

on_error: "passthrough"
