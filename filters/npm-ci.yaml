name: "npm-ci"
version: 1
description: "Condensed npm ci output: summary and errors only"

match:
  command: "npm"
  subcommand: "ci"
  exclude_flags: ["--version", "-v"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "remove_lines"
    pattern: "(^npm warn deprecated|^npm notice|looking for funding|run .npm fund|npm warn |^npm info )"
  - action: "keep_lines"
    pattern: "(^added |^removed |^up to date|^npm error|^npm ERR!|^ERESOLVE|peer dep|Could not resolve)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"
  - action: "on_empty"
    message: "ok"

on_error: "passthrough"

tests:
  - name: "successful ci"
    input: |

      up to date, audited 246 packages in 1s

      found 0 vulnerabilities
    expected: |
      up to date, audited 246 packages in 1s
  - name: "install error"
    input: |
      npm ERR! code ERESOLVE
      npm ERR! ERESOLVE unable to resolve dependency tree
    expected: |
      npm ERR! code ERESOLVE
      npm ERR! ERESOLVE unable to resolve dependency tree
