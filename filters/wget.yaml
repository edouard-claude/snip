name: "wget"
version: 1
description: "Condensed wget output: download summary"

match:
  command: "wget"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\s*\\d+K|\\.\\.\\.|^\\s*$)"
  - action: "keep_lines"
    pattern: "(Saving|saved|Resolving|Connecting|HTTP|ERROR|failed|Downloaded|Length:)"
  - action: "truncate_lines"
    max: 120

on_error: "passthrough"
