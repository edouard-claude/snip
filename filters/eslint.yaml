name: "eslint"
version: 3
description: "Condensed eslint output: file errors and summary"

match:
  command: "eslint"
  exclude_flags: ["-f", "--format", "--version"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  # Remove blank lines
  - action: "remove_lines"
    pattern: "^\\s*$"
  # Remove fixable hint line
  - action: "remove_lines"
    pattern: "potentially fixable"
  # Keep file paths (start with /), error/warning lines (indented line:col), and summary
  - action: "keep_lines"
    pattern: "(^/|^\\s+\\d+:\\d+|problems?|\\d+ errors?|\\d+ warnings?)"
  # Compact paths in file header lines
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more errors truncated"
  # If eslint outputs nothing (no errors), return ok
  - action: "on_empty"
    message: "ok (no lint errors)"

on_error: "passthrough"

tests:
  - name: "no errors produces ok"
    input: ""
    expected: |
      ok (no lint errors)
  - name: "errors with summary"
    input: |
      /home/user/project/src/file.js
        1:10  error    Unexpected var, use let or const instead  no-var
        2:5   warning  Missing semicolon                          semi

      /home/user/project/src/other.js
        3:1   error    Parsing error: Unexpected token

      ✖ 3 problems (2 errors, 1 warning)
        1 error and 0 warnings potentially fixable with the `--fix` option.
    expected: |
      /home/user/project/src/file.js
        1:10  error    Unexpected var, use let or const instead  no-var
        2:5   warning  Missing semicolon                          semi
      /home/user/project/src/other.js
        3:1   error    Parsing error: Unexpected token
      ✖ 3 problems (2 errors, 1 warning)
  - name: "single file error"
    input: |
      /app/src/index.js
        5:3  error  'x' is defined but never used  no-unused-vars

      ✖ 1 problem (1 error, 0 warnings)
    expected: |
      /app/src/index.js
        5:3  error  'x' is defined but never used  no-unused-vars
      ✖ 1 problem (1 error, 0 warnings)
