name: "ls"
version: 2
description: "Compact ls output: reformats long listings to date+name+size, removes noise, extension summary"

match:
  command: "ls"

pipeline:
  - action: "strip_ansi"
  # Remove "total NNN" summary lines from ls -l
  - action: "remove_lines"
    pattern: "^total\\s"
  # Remove . and .. entries (both plain ls -a and ls -l formats)
  - action: "remove_lines"
    pattern: "(?:^|\\s)\\.\\.?$"
  # Reformat ls -l lines to "date  name  size". Locale-independent: anchors on
  # the time (HH:MM) or year (YYYY) pattern instead of month names.
  # Works with English, French, and other locales.
  - action: "replace"
    pattern: "^\\S+\\s+\\d+\\s+.*\\s(\\d\\S*)\\s+(\\S+\\s+\\S+\\s+[\\d:]{4,5})\\s+(.+)$"
    replacement: "$2  $3  $1"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 300
    overflow_msg: "... +more entries (truncated by snip)"
  # Append extension summary at the end. The leading "[^\s.]" ensures we only
  # capture real extensions (preceded by a non-dot, non-whitespace char), so
  # hidden directories like .claude or .git are not miscounted as extensions.
  - action: "group_by"
    pattern: "[^\\s.]\\.([a-zA-Z][a-zA-Z0-9]*)(?:\\s|$)"
    format: "{{.Key}}: {{.Count}}"
    top: 8
    append: true

on_error: "passthrough"

tests:
  - name: "summary excludes hidden directories and dotfiles without extensions"
    input: |
      total 16
      drwxr-xr-x  3 user staff   96 Apr 23 14:13 .claude
      drwxr-xr-x 15 user staff  480 Apr 28 09:19 .git
      -rw-r--r--  1 user staff  171 Apr 23 13:47 .mcp.json
      -rw-r--r--  1 user staff 1234 Apr 28 10:00 README.md
      -rw-r--r--  1 user staff  500 Apr 28 09:19 main.go
    expected: |
      Apr 23 14:13  .claude  96
      Apr 28 09:19  .git  480
      Apr 23 13:47  .mcp.json  171
      Apr 28 10:00  README.md  1234
      Apr 28 09:19  main.go  500
      json: 1
      md: 1
      go: 1
  - name: "cygwin two-word group is parsed correctly"
    input: |
      total 104617
      drwxrwx---+  1 jspelletier Domain Users     0 Apr 28 09:19 .
      drwxrwx---+  1 jspelletier Domain Users     0 Dec 11 10:20 ..
      -rwxrwx---+  1 jspelletier Domain Users   171 Apr 23 13:47 .mcp.json
      -r--r--r--   1 jspelletier Domain Users  1234 Apr 28 10:00 README.md
    expected: |
      Apr 23 13:47  .mcp.json  171
      Apr 28 10:00  README.md  1234
      json: 1
      md: 1
  - name: "cygwin actual user output with ACL+ marker and year column"
    input: |
      total 104617
      drwxrwx---+  1 jspelletier     Domain Users        0 Apr 28 09:19 .
      drwxrwx---+  1 jspelletier     Domain Users        0 Dec 11 10:20 ..
      -r-xr-x---+  2 jspelletier     Domain Users     8429 Jan 30  2024 .clang-format
      drwxrwx---+  1 jspelletier     Domain Users        0 Apr 23 14:13 .claude
      -r-xr-x---+  1 jspelletier     Domain Users     9020 Jul 22  2025 .editorconfig
      -rwxrwx---+  1 jspelletier     Domain Users      171 Apr 23 13:47 .mcp.json
    expected: |
      Jan 30  2024  .clang-format  8429
      Apr 23 14:13  .claude  0
      Jul 22  2025  .editorconfig  9020
      Apr 23 13:47  .mcp.json  171
      json: 1
