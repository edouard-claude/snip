name: "nx"
version: 1
description: "Condensed nx output: task results summary"

match:
  command: "nx"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(Successfully|Failed|error|Error|NX|Running|Done in|\\d+ succeeded|\\d+ failed)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30

on_error: "passthrough"
