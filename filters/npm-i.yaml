name: "npm-i"
version: 1
description: "Condensed npm install (short form) output: summary and errors only"

match:
  command: "npm"
  subcommand: "i"
  exclude_flags: ["--version", "-v"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "remove_lines"
    pattern: "(^npm warn deprecated|^npm notice|looking for funding|run .npm fund|npm warn |^npm info )"
  - action: "keep_lines"
    pattern: "(^added |^removed |^up to date|^npm error|^npm ERR!|^ERESOLVE|peer dep|Could not resolve)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"
  - action: "on_empty"
    message: "ok"

on_error: "passthrough"

tests:
  - name: "successful install"
    input: |
      npm warn deprecated inflight@1.0.6: This module is not supported

      added 245 packages, and audited 246 packages in 12s

      29 packages are looking for funding
        run `npm fund` for details

      found 0 vulnerabilities
    expected: |
      added 245 packages, and audited 246 packages in 12s
  - name: "install error"
    input: |
      npm ERR! code ERESOLVE
      npm ERR! ERESOLVE unable to resolve dependency tree
    expected: |
      npm ERR! code ERESOLVE
      npm ERR! ERESOLVE unable to resolve dependency tree
