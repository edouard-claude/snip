name: "poetry-install"
version: 1
description: "Condensed poetry output: install summary"

match:
  command: "poetry"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\s*(Downloading|Installing|Updating)\\s|^\\s*$)"
  - action: "keep_lines"
    pattern: "(Package operations|Writing|No dependencies|error|already installed|resolved)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20

on_error: "passthrough"
