name: "prisma"
version: 1
description: "Condensed prisma output: migration and generation status"

match:
  command: "prisma"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(Generated|created|applied|Error|error|Your database|already in sync|migrate|Prisma schema)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20

on_error: "passthrough"
