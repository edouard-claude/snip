name: "liquibase"
version: 1
description: "Condensed liquibase output: migration status"

match:
  command: "liquibase"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\s*(Starting|Running|Liquibase \\d)|^\\s*$)"
  - action: "keep_lines"
    pattern: "(Successfully|FAILED|Error|ChangeSet|executed|rolled back|UPDATE|Tag)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30

on_error: "passthrough"
