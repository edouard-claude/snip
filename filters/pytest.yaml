name: "pytest"
version: 3
description: "Condensed pytest output: failures with locations and summary line"

match:
  command: "pytest"
  exclude_flags: ["--tb=no", "--co", "--collect-only", "--version", "-V"]

inject:
  args: ["--tb=line", "-q"]
  skip_if_present: ["--tb=", "-q", "--quiet", "--co", "--collect-only", "-v", "--verbose"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  # Remove progress dots/letters line (e.g. "..F..x.  [100%]")
  - action: "remove_lines"
    pattern: "^[.FEsxX]+\\s+\\[\\d+%\\]"
  # Remove blank lines
  - action: "remove_lines"
    pattern: "^\\s*$"
  # Remove pure separator lines (only =, _, or spaces - no content)
  - action: "remove_lines"
    pattern: "^[=_ ]+$"
  # Remove "short test summary info" header
  - action: "remove_lines"
    pattern: "^\\s*short test summary info\\s*$"
  # Keep only FAILED lines and the final summary (N failed, M passed in Xs)
  - action: "keep_lines"
    pattern: "(^FAILED |\\d+ (passed|failed|error).* in \\d)"
  # Strip leading/trailing === decorators from summary lines
  - action: "replace"
    pattern: "^=+ | =+$"
    replacement: ""
  # Shorten paths
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 30
    overflow_msg: "... more failures truncated"

on_error: "passthrough"

tests:
  - name: "all passing with -q output"
    input: |
      ..........                                                               [100%]
      10 passed in 0.45s
    expected: |
      10 passed in 0.45s
  - name: "failures with -q --tb=line output"
    input: |
      ..F.F                                                                    [100%]
      FAILED test_math.py::test_add - assert 3 == 4
      FAILED test_math.py::test_sub - assert 1 == 0
      2 failed, 3 passed in 0.12s
    expected: |
      FAILED test_math.py::test_add - assert 3 == 4
      FAILED test_math.py::test_sub - assert 1 == 0
      2 failed, 3 passed in 0.12s
  - name: "verbose output with decorators"
    input: |
      ============================= test session starts ==============================
      collected 3 items

      test_module.py::test_one PASSED
      test_module.py::test_two FAILED

      =================================== FAILURES ===================================
      _____________________________ test_two _____________________________________

      FAILED test_module.py::test_two - AssertionError
      =========================== short test summary info ============================
      FAILED test_module.py::test_two - AssertionError
      ========================= 1 failed, 1 passed in 0.05s =========================
    expected: |
      FAILED test_module.py::test_two - AssertionError
      FAILED test_module.py::test_two - AssertionError
      1 failed, 1 passed in 0.05s
