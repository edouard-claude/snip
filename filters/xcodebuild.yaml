name: "xcodebuild"
version: 1
description: "Condensed xcodebuild output: build result and errors"

match:
  command: "xcodebuild"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\s*(CompileC|Ld|CpResource|ProcessInfoPlistFile|CodeSign|Touch|MkDir|WriteAuxiliaryFile)|^\\s*cd |^\\s*/|^\\s*export |^\\s*$)"
  - action: "keep_lines"
    pattern: "(BUILD|FAILED|error:|warning:|\\*\\* BUILD|Test Suite|Test Case|Executed \\d+|Generating)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 40

on_error: "passthrough"
