name: "rake"
version: 1
description: "Condensed rake output: task results and errors"

match:
  command: "rake"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "(passed|failed|error|Error|FAIL|OK|Finished|assertions?|tests?|Failure|rake aborted)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 40
    overflow_msg: "... more output"

on_error: "passthrough"
