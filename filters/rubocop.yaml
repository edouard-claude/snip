name: "rubocop"
version: 1
description: "Condensed rubocop output: offenses by file"

match:
  command: "rubocop"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^Inspecting|^\\.+$|^\\s*$)"
  - action: "keep_lines"
    pattern: "(^[A-Z]:|offenses? detected|no offenses|files? inspected|error|warning|convention)"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more offenses"

on_error: "passthrough"
