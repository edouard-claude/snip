name: "gcc"
version: 1
description: "Condensed gcc/g++ output: errors and warnings"

match:
  command: "gcc"
  exclude_flags: ["--version", "-V"]

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "keep_lines"
    pattern: "(error:|warning:|note:|fatal error|undefined reference|linker|ld:|In function)"
  - action: "compact_path"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 50
    overflow_msg: "... more errors"
  - action: "on_empty"
    message: "ok (compiled)"

on_error: "passthrough"
