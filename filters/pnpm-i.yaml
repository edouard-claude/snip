name: "pnpm-i"
version: 1
description: "Condensed pnpm install (short form) output: summary and errors"

match:
  command: "pnpm"
  subcommand: "i"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "(^\\+{3,}|^Progress:|^\\s*$)"
  - action: "truncate_lines"
    max: 120
  - action: "head"
    n: 20
    overflow_msg: "... more output truncated"

on_error: "passthrough"
